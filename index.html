<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اشتراك - رحلات البابا اثناسيوس</title>
<meta name="description" content="صفحة التسجيل الرسمية لرحلات البابا اثناسيوس">
<style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');

    :root {
        --bg: #0a0a0f;
        --neon: #00e5ff;
        --neon-glow: 0 0 10px #00e5ff, 0 0 20px #00e5ff;
        --text: #e0e0e0;
        --card: #151520;
        --red: #ff4444;
    }

    body {
        background: var(--bg);
        color: var(--text);
        font-family: 'Cairo', sans-serif;
        min-height: 100vh;
        padding: 20px;
        display: flex;
        justify-content: center;
    }

   .container {
        width: 100%;
        max-width: 600px;
        background: var(--card);
        border: 2px solid var(--neon);
        border-radius: 15px;
        padding: 30px;
        box-shadow: var(--neon-glow);
        transition: 0.5s;
    }

   .container.glow {
        box-shadow: 0 0 20px #00e5ff, 0 0 40px #00e5ff, 0 0 60px #00e5ff;
        border-color: #00e5ff;
    }

    h1 {
        text-align: center;
        color: var(--neon);
        text-shadow: var(--neon-glow);
        margin-bottom: 20px;
    }

   .lang-switch {
        display: flex;
        gap: 10px;
        justify-content: center;
        margin-bottom: 20px;
        flex-wrap: wrap;
    }

    button {
        background: transparent;
        border: 2px solid var(--neon);
        color: var(--neon);
        padding: 10px 20px;
        border-radius: 8px;
        cursor: pointer;
        font-family: 'Cairo', sans-serif;
        font-weight: 700;
    }

    button:hover {
        background: var(--neon);
        color: var(--bg);
        box-shadow: var(--neon-glow);
    }

   .input-group {
        display: flex;
        gap: 10px;
        margin-bottom: 15px;
        flex-wrap: wrap;
    }

    input, select {
        flex: 1;
        min-width: 120px;
        padding: 12px;
        background: var(--bg);
        border: 2px solid var(--neon);
        border-radius: 8px;
        color: var(--text);
        font-size: 16px;
    }

   .admin-area {
        display: none;
        margin-top: 20px;
        border-top: 1px solid var(--neon);
        padding-top: 20px;
    }

   .competitions-area {
        display: none;
        margin-top: 20px;
        border-top: 1px solid var(--neon);
        padding-top: 20px;
    }

   .competitions-area h3 {
        text-align: center;
        color: var(--neon);
        text-shadow: var(--neon-glow);
        margin-bottom: 15px;
    }

   .coming-soon {
        text-align: center;
        font-size: 32px;
        font-weight: 700;
        color: var(--neon);
        background: var(--bg);
        border: 2px solid var(--neon);
        border-radius: 12px;
        padding: 40px 20px;
        text-shadow: var(--neon-glow);
        box-shadow: var(--neon-glow);
        letter-spacing: 3px;
        animation: pulse 2s infinite;
    }

    @keyframes pulse {
        0%, 100% { box-shadow: 0 0 10px #00e5ff, 0 0 20px #00e5ff; }
        50% { box-shadow: 0 0 20px #00e5ff, 0 0 40px #00e5ff; }
    }

   .person {
        background: var(--bg);
        border: 1px solid var(--neon);
        padding: 12px;
        margin-bottom: 10px;
        border-radius: 8px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

   .remove-btn {
        border: 1px solid var(--red);
        color: var(--red);
        padding: 5px 12px;
    }

    #countdown {
        text-align: center;
        font-size: 24px;
        font-weight: 700;
        color: var(--neon);
        margin: 20px 0;
        text-shadow: var(--neon-glow);
    }

    #countdown.finished {
        color: #00e5ff;
        animation: blink 1s infinite;
    }

    @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
    }

    label {
        display: block;
        margin-bottom: 5px;
        font-weight: 700;
    }
</style>
</head>
<body>
<div class="container" id="mainContainer">
    <div class="lang-switch">
        <button onclick="setLang('ar')">العربية</button>
        <button onclick="setLang('en')">English</button>
        <button onclick="setLang('ja')">日本語</button>
    </div>

    <h1 id="title">اشتراك رحلات البابا اثناسيوس</h1>

    <div id="countdown"></div>

    <div id="userForm">
        <div class="input-group">
            <input type="text" id="nameInput" placeholder="اكتب اسمك هنا">
            <button id="registerBtn" onclick="register()">تسجيل</button>
        </div>
    </div>

    <button onclick="loginAdmin()">دخول المسؤول</button>
    <button onclick="toggleCompetitions()">المسابقات</button>

    <div class="admin-area" id="adminArea">
        <h3 id="dateTitle">تحديد معاد الرحلة</h3>
        <div class="input-group">
            <input type="date" id="tripDate">
            <button onclick="setTripDate()">حفظ المعاد</button>
        </div>

        <h3 id="listTitle">المسجلين</h3>
        <div id="peopleList"></div>
        <div class="counter" id="counter">العدد: 0</div>
    </div>

    <div class="competitions-area" id="competitionsArea">
        <h3>المسابقات</h3>
        <div class="coming-soon">COMING SOON</div>
    </div>
</div>

<script>
    let people = JSON.parse(localStorage.getItem('subscribers') || '[]');
    let adminPassword = "250746";
    let currentLang = 'ar';
    let tripDate = localStorage.getItem('tripDate');

    const translations = {
        ar: {title: "اشتراك رحلات البابا اثناسيوس", placeholder: "اكتب اسمك هنا",
             register: "تسجيل", list: "المسجلين", remove: "إلغاء", count: "العدد",
             wrongPass: "باسورد غلط", dateTitle: "تحديد معاد الرحلة", saveDate: "حفظ المعاد",
             days: "يوم", hours: "ساعة", mins: "دقيقة", secs: "ثانية", finished: "الرحلة بدأت!"},
        en: {title: "Pope Athanasius Trips Subscription", placeholder: "Enter your name",
             register: "Register", list: "Registered", remove: "Remove", count: "Count",
             wrongPass: "Wrong password", dateTitle: "Set Trip Date", saveDate: "Save Date",
             days: "Days", hours: "Hours", mins: "Mins", secs: "Secs", finished: "Trip Started!"},
        ja: {title: "アタナシオス法王旅行登録", placeholder: "名前を入力してください",
             register: "登録", list: "登録者", remove: "削除", count: "人数",
             wrongPass: "パスワードが違います", dateTitle: "旅行日を設定", saveDate: "保存",
             days: "日", hours: "時間", mins: "分", secs: "秒", finished: "旅行開始!"}
    };

    window.onload = function() {
        if (tripDate) {
            document.getElementById('tripDate').value = tripDate;
            startCountdown();
        }
        updateList();
    }

    function setLang(lang) {
        currentLang = lang;
        const t = translations[lang];
        document.getElementById('title').textContent = t.title;
        document.getElementById('nameInput').placeholder = t.placeholder;
        document.getElementById('registerBtn').textContent = t.register;
        document.getElementById('listTitle').textContent = t.list;
        document.getElementById('dateTitle').textContent = t.dateTitle;
        document.documentElement.lang = lang;
        document.documentElement.dir = lang === 'ar'? 'rtl' : 'ltr';
        updateList();
        if (tripDate) startCountdown();
    }

    function register() {
        const name = document.getElementById('nameInput').value.trim();
        if (!name) return alert("اكتب اسمك الأول!");

        const newPerson = {
            id: Date.now(),
            name: name,
            time: new Date().toLocaleString()
        };

        people.push(newPerson);
        localStorage.setItem('subscribers', JSON.stringify(people));

        document.getElementById('nameInput').value = '';
        updateList();
        alert(currentLang === 'ar'? "تم التسجيل بنجاح!" : "Registered successfully!");
    }

    function loginAdmin() {
        let pass = prompt(currentLang === 'ar'? "ادخل باسورد المسؤول:" : "Enter admin password:");
        if (pass === adminPassword) {
            document.getElementById('adminArea').style.display = 'block';
        } else {
            alert(translations[currentLang].wrongPass);
        }
    }

    function toggleCompetitions() {
        const area = document.getElementById('competitionsArea');
        area.style.display = area.style.display === 'block'? 'none' : 'block';
    }

    function removePerson(id) {
        people = people.filter(p => p.id!= id);
        localStorage.setItem('subscribers', JSON.stringify(people));
        updateList();
    }

    function setTripDate() {
        const date = document.getElementById('tripDate').value;
        if (!date) return alert("اختار معاد!");
        tripDate = date;
        localStorage.setItem('tripDate', date);
        startCountdown();
    }

    function updateList() {
        const listDiv = document.getElementById('peopleList');
        listDiv.innerHTML = '';
        const t = translations[currentLang];

        people.forEach(p => {
            const div = document.createElement('div');
            div.className = 'person';
            div.innerHTML = `
                <span>${p.name} <small style="opacity:0.6">- ${p.time}</small></span>
                <button class="remove-btn" onclick="removePerson('${p.id}')">${t.remove}</button>
            `;
            listDiv.appendChild(div);
        });

        document.getElementById('counter').textContent = `${t.count}: ${people.length}`;
    }

    function startCountdown() {
        if (!tripDate) return;

        const countDownDate = new Date(tripDate).getTime();
        clearInterval(window.countdownInterval);

        window.countdownInterval = setInterval(() => {
            const now = new Date().getTime();
            const distance = countDownDate - now;
            const t = translations[currentLang];
            const countDiv = document.getElementById('countdown');
            const container = document.getElementById('mainContainer');

            if (distance < 0) {
                countDiv.innerHTML = t.finished;
                countDiv.classList.add('finished');
                container.classList.add('glow');
                clearInterval(window.countdownInterval);
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            countDiv.innerHTML = `${days} ${t.days} ${hours} ${t.hours} ${minutes} ${t.mins} ${seconds} ${t.secs}`;
        }, 1000);
    }
</script>
</body>
</html>
