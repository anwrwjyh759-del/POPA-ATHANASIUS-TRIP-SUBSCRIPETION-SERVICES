<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رحلات البابا أثناسيوس</title>
<style>
  body {
    font-family: 'Cairo', Tahoma, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    text-align: center;
    padding: 50px 20px;
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .box {
    background: white;
    padding: 40px 30px;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    max-width: 420px;
    width: 100%;
  }
  h2 {
    color: #333;
    margin-bottom: 10px;
  }
  p {
    color: #666;
  }
  button {
    background: #4285f4;
    color: white;
    border: none;
    padding: 14px 28px;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    margin-top: 20px;
    width: 100%;
    font-weight: bold;
    transition: 0.3s;
  }
  button:hover {
    background: #357ae8;
    transform: translateY(-2px);
  }
  #userInfo {
    margin-top: 20px;
    display: none;
  }
  #userName {
    font-size: 18px;
    font-weight: bold;
    color: #333;
  }
  #logoutBtn {
    background: #dc3545;
  }
  #logoutBtn:hover {
    background: #c82333;
  }
</style>
</head>
<body>

<div class="box">
  <h2>أهلاً بيك في رحلات البابا أثناسيوس</h2>
  
  <div id="loginSection">
    <p>سجل دخولك بجوجل عشان تكمل</p>
    <button id="loginBtn">تسجيل الدخول بجوجل</button>
  </div>
  
  <div id="userInfo">
    <p id="userName"></p>
    <button id="logoutBtn">تسجيل خروج</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  // Firebase configuration بتاعك
  const firebaseConfig = {
    apiKey: "AIzaSyClQnuMs84jxHNam8KQVuT8iMgTGq7-ZVg",
    authDomain: "papa-athanasius-trips.firebaseapp.com",
    projectId: "papa-athanasius-trips",
    storageBucket: "papa-athanasius-trips.firebasestorage.app",
    messagingSenderId: "363546177326",
    appId: "1:363546177326:web:cad831478b4db632cc14bf",
    measurementId: "G-LR2516LPJR"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  const loginBtn = document.getElementById('loginBtn');
  const logoutBtn = document.getElementById('logoutBtn');
  const loginSection = document.getElementById('loginSection');
  const userInfo = document.getElementById('userInfo');
  const userName = document.getElementById('userName');

  // تسجيل الدخول
  loginBtn.onclick = async () => {
    try {
      await signInWithPopup(auth, provider);
    } catch (error) {
      alert('خطأ في تسجيل الدخول: ' + error.message);
      console.error(error);
    }
  };

  // تسجيل الخروج
  logoutBtn.onclick = () => {
    signOut(auth);
  };

  // مراقبة حالة الدخول
  onAuthStateChanged(auth, (user) => {
    if (user) {
      loginSection.style.display = 'none';
      userInfo.style.display = 'block';
      userName.textContent = `مرحباً ${user.displayName}`;
    } else {
      loginSection.style.display = 'block';
      userInfo.style.display = 'none';
    }
  });
</script>

</body>
</html>
